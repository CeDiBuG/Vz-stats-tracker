<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizeo | Esport Team</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        body { background-color: #0a0a0c; color: #e2e8f0; font-family: 'Rajdhani', sans-serif; scroll-behavior: smooth; }
        .font-gaming { font-family: 'Orbitron', sans-serif; }
        .neon-border { box-shadow: 0 0 10px #eab308, 0 0 20px #eab308; border: 1px solid #eab308; }
        .card-gradient { background: linear-gradient(145deg, #111827, #1f2937); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center p-6 bg-black/80 sticky top-0 z-50 backdrop-blur-md border-b border-yellow-900">
        <div class="text-2xl font-gaming font-bold text-yellow-400 tracking-widest uppercase">Vizeo</div>
        <ul class="hidden md:flex space-x-8 font-medium uppercase tracking-tighter">
            <li><a href="#home" class="hover:text-yellow-400 transition">Accueil</a></li>
            <li><a href="#roster" class="hover:text-yellow-400 transition">Équipe</a></li>
            <li><a href="#matches" class="hover:text-yellow-400 transition">Matchs</a></li>
        </ul>
    </nav>

    <section id="home" class="relative h-[70vh] flex items-center justify-center overflow-hidden border-b border-yellow-900 text-center px-4">
        <div class="absolute inset-0 z-0 opacity-30 grayscale">
            <img src="https://distribution.faceit-cdn.net/images/c6e899fa-8e39-48f6-9e1b-ebbea950ca7b.jpg" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0c] via-transparent to-transparent"></div>
        </div>
        <div class="relative z-10">
            <img id="team-logo" src="" class="w-32 h-32 rounded-full mx-auto mb-6 border-4 border-yellow-500 shadow-lg hidden">
            <h1 class="text-6xl md:text-8xl font-gaming font-bold mb-4 italic uppercase"><span id="team-name">Vizeo</span> <span class="text-yellow-500">Esport</span></h1>
            <p class="text-lg text-gray-400 tracking-widest uppercase mb-8">Elite Competitive Division</p>
            <a href="#roster" class="neon-border px-8 py-3 bg-transparent text-yellow-400 font-gaming font-bold hover:bg-yellow-500 hover:text-black transition duration-300 uppercase">Voir le Roster</a>
        </div>
    </section>

    <section id="roster" class="py-20 px-6 max-w-7xl mx-auto text-center">
        <h2 class="text-4xl font-gaming mb-16 italic underline decoration-yellow-500 underline-offset-8 uppercase tracking-tighter">Le Roster</h2>
        <div id="player-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6">
            <p class="text-center col-span-full text-gray-500 animate-pulse font-gaming uppercase italic">Chargement des joueurs...</p>
        </div>
    </section>

    <footer class="bg-black py-10 border-t border-yellow-900 text-center text-gray-600 uppercase text-xs font-gaming">
        Vizeo Gaming &copy; 2023 - Powered by Faceit API
    </footer>

    <script>
        async function init() {
            try {
                const response = await fetch('/api/faceit');
                if (!response.ok) throw new Error("Erreur serveur");

                const data = await response.json();

                document.getElementById('team-name').innerText = data.name;
                const logoImg = document.getElementById('team-logo');
                logoImg.src = data.avatar;
                logoImg.classList.remove('hidden');

                renderPlayers(data.members);
            }
        }

        function renderPlayers(members) {
            const container = document.getElementById('player-container');
            container.innerHTML = ""; 

            members.forEach(m => {
                container.innerHTML += `
                    <div class="card-gradient p-4 rounded-xl text-center border border-transparent hover:border-yellow-500 transition duration-300 group">
                        <img src="${m.avatar}" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-gray-800 group-hover:border-yellow-500 transition" alt="${m.nickname}">
                        <h3 class="text-xl font-gaming font-bold uppercase">${m.nickname}</h3>
                        <p class="text-yellow-400 text-sm uppercase mb-2 italic">Pro Player</p>
                    </div>
                `;
            });
        }

        function loadSimulation() {
            const mock = [
                { nickname: "Player 1", avatar: "" },
                { nickname: "Player 2", avatar: "" }
            ];
            renderPlayers(mock);
        }

        window.onload = init;
    </script>
</body>
</html>
